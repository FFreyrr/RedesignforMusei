<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P2 - Dark Mode UI Overview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="page-switcher.css?v=20260618-switcher" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #001a17;
      color: #f3fffb;
      font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .showcase-page {
      width: min(100%, 520px);
      margin: 0 auto;
      padding: 28px 24px 56px;
    }
    .showcase-header {
      margin-bottom: 26px;
    }
    .showcase-kicker {
      margin: 0 0 6px;
      color: rgba(243,255,251,0.62);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-family: 'Times New Roman', Times, serif;
      font-size: 34px;
      line-height: 1.05;
      color: #00a67e;
    }
    .showcase-meta {
      margin: 10px 0 0;
      color: rgba(243,255,251,0.68);
      font-size: 14px;
    }
    .showcase-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
    }
    .showcase-item {
      display: grid;
      gap: 10px;
    }
    .showcase-item-header {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(243,255,251,0.72);
    }
    .showcase-item-header span {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(0,166,126,0.18);
      color: #00a67e;
      font-size: 12px;
      font-weight: 700;
    }
    .showcase-item-header h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }
    iframe {
      width: 393px;
      height: 852px;
      border: 0;
      border-radius: 46px;
      overflow: hidden;
      background: #002621;
      box-shadow: 0 18px 42px rgba(0,0,0,0.28);
    }
  </style>
</head>
<body class="has-page-switcher" data-theme="dark">
  <nav class="page-switcher" aria-label="Page switcher">
    <a href="index.html?v=english-showcase-nav">Prototype</a>
    <a class="is-active" href="p2.html?v=split-states">P2 Dark</a>
    <a href="p3.html?v=split-states">P3 Light</a>
  </nav>
  <main class="showcase-page">
    <header class="showcase-header">
      <p class="showcase-kicker">P2 / <span id="showcaseTheme">Dark Mode</span></p>
      <h1>UI Overview</h1>
      <p class="showcase-meta" id="showcaseCount"></p>
    </header>
    <section class="showcase-list" id="showcaseList"></section>
  </main>
  <script src="showcase.js?v=20260621-qr-wallet-page"></script>
</body>
</html>
